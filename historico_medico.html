<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico Médico - Pet Guardian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .link-voltar {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #f8f9fa;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="link-voltar">← Voltar ao Menu</a>
        <h1>Gerenciar Histórico Médico</h1>
        
        <div class="card">
            <h2>Adicionar Registro Médico</h2>
            <div id="message" class="message"></div>
            <form id="historicoForm">
                <div class="form-group">
                    <label>Data da Consulta:</label>
                    <input type="date" id="dataconsulta" required>
                </div>
                <div class="form-group">
                    <label>ID Animal:</label>
                    <input type="number" id="animalid" required>
                </div>
                <div class="form-group">
                    <label>ID Veterinário:</label>
                    <input type="number" id="veterinarioid" required>
                </div>
                <div class="form-group">
                    <label>Diagnóstico:</label>
                    <input type="text" id="diagnostico">
                </div>
                <div class="form-group">
                    <label>Tratamento:</label>
                    <input type="text" id="tratamento">
                </div>
                <div class="form-group">
                    <label>Observações:</label>
                    <textarea id="observacoes"></textarea>
                </div>
                <div class="form-group">
                    <label>Exame Clínico:</label>
                    <textarea id="exameclinico"></textarea>
                </div>
                <button type="submit">Adicionar</button>
            </form>
        </div>
        
        <div class="card">
            <h2>Lista de Histórico Médico</h2>
            <button onclick="carregarHistorico()" class="btn-secondary">Atualizar</button>
            <div id="historicoList">
                <p>Carregando...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://apppetguardian.onrender.com';
        
        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('message');
            msg.textContent = texto;
            msg.className = 'message ' + tipo;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }
        
        async function carregarHistorico() {
            const div = document.getElementById('historicoList');
            div.innerHTML = '<p>Carregando...</p>';
            
            try {
                const response = await fetch(`${API_URL}/historicomedico/`);
                if (!response.ok) throw new Error('Endpoint não disponível ainda');
                
                const historicos = await response.json();
                
                if (!historicos || historicos.length === 0) {
                    div.innerHTML = '<p>Nenhum registro médico cadastrado.</p>';
                    return;
                }
                
                let html = '<table><tr><th>ID</th><th>Data Consulta</th><th>Animal ID</th><th>Veterinário ID</th><th>Diagnóstico</th><th>Tratamento</th></tr>';
                historicos.forEach(hist => {
                    html += `<tr>
                        <td>${hist.ID || hist.id || '-'}</td>
                        <td>${hist.DATACONSULTA || hist.dataconsulta || '-'}</td>
                        <td>${hist.ANIMALID || hist.animalid || '-'}</td>
                        <td>${hist.VETERINARIOID || hist.veterinarioid || '-'}</td>
                        <td>${hist.DIAGNOSTICO || hist.diagnostico || '-'}</td>
                        <td>${hist.TRATAMENTO || hist.tratamento || '-'}</td>
                    </tr>`;
                });
                html += '</table>';
                div.innerHTML = html;
            } catch (error) {
                div.innerHTML = `<p style="color: red;">Endpoint ainda não implementado na API. Erro: ${error.message}</p>`;
            }
        }
        
        document.getElementById('historicoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                dataconsulta: document.getElementById('dataconsulta').value,
                animalid: parseInt(document.getElementById('animalid').value),
                veterinarioid: parseInt(document.getElementById('veterinarioid').value),
                diagnostico: document.getElementById('diagnostico').value,
                tratamento: document.getElementById('tratamento').value,
                observacoes: document.getElementById('observacoes').value,
                exameclinico: document.getElementById('exameclinico').value
            };
            
            try {
                const response = await fetch(`${API_URL}/historicomedico/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('Endpoint não disponível ainda');
                
                mostrarMensagem('Registro médico adicionado com sucesso!', 'success');
                document.getElementById('historicoForm').reset();
                carregarHistorico();
            } catch (error) {
                mostrarMensagem('Endpoint ainda não implementado na API. Erro: ' + error.message, 'error');
            }
        });
        
        carregarHistorico();
    </script>
</body>
</html>
