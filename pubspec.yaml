name: pet_guardian
description: Pet Guardian - Aplicativo para tutores e clínicas veterinárias

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  google_sign_in: ^7.2.0
  image_picker: ^1.0.4
  table_calendar: ^3.0.9
  flutter_local_notifications: ^21.0.0
  share_plus: ^13.1.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - Icon.png