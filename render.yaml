services:
  - type: web
    name: pet-guardian-api
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: |
      cd Backend/API &&
      python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: pet-guardian-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
        value: "https://pet-guardian.netlify.app"  # Altere para a URL do Netlify após o deploy (ex: https://seu-site.netlify.app)

