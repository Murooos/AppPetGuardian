<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convênios - Pet Guardian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .link-voltar {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #f8f9fa;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="link-voltar">← Voltar ao Menu</a>
        <h1>Gerenciar Convênios</h1>
        
        <div class="card">
            <h2>Adicionar Convênio</h2>
            <div id="message" class="message"></div>
            <form id="convenioForm">
                <div class="form-group">
                    <label>Nome:</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label>Tipo de Plano:</label>
                    <input type="text" id="tipoplano">
                </div>
                <div class="form-group">
                    <label>Data de Validade:</label>
                    <input type="date" id="datavalidade">
                </div>
                <button type="submit">Adicionar</button>
            </form>
        </div>
        
        <div class="card">
            <h2>Lista de Convênios</h2>
            <button onclick="carregarConvenios()" class="btn-secondary">Atualizar</button>
            <div id="conveniosList">
                <p>Carregando...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://apppetguardian.onrender.com';
        
        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('message');
            msg.textContent = texto;
            msg.className = 'message ' + tipo;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }
        
        async function carregarConvenios() {
            const div = document.getElementById('conveniosList');
            div.innerHTML = '<p>Carregando...</p>';
            
            try {
                const response = await fetch(`${API_URL}/convenios/`);
                if (!response.ok) throw new Error('Endpoint não disponível ainda');
                
                const convenios = await response.json();
                
                if (!convenios || convenios.length === 0) {
                    div.innerHTML = '<p>Nenhum convênio cadastrado.</p>';
                    return;
                }
                
                let html = '<table><tr><th>ID</th><th>Nome</th><th>Tipo de Plano</th><th>Data Validade</th></tr>';
                convenios.forEach(convenio => {
                    html += `<tr>
                        <td>${convenio.ID || convenio.id || '-'}</td>
                        <td>${convenio.NOME || convenio.nome || '-'}</td>
                        <td>${convenio.TIPOPLANO || convenio.tipoplano || '-'}</td>
                        <td>${convenio.DATAVALIDADE || convenio.datavalidade || '-'}</td>
                    </tr>`;
                });
                html += '</table>';
                div.innerHTML = html;
            } catch (error) {
                div.innerHTML = `<p style="color: red;">Endpoint ainda não implementado na API. Erro: ${error.message}</p>`;
            }
        }
        
        document.getElementById('convenioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                nome: document.getElementById('nome').value,
                tipoplano: document.getElementById('tipoplano').value,
                datavalidade: document.getElementById('datavalidade').value
            };
            
            try {
                const response = await fetch(`${API_URL}/convenios/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('Endpoint não disponível ainda');
                
                mostrarMensagem('Convênio adicionado com sucesso!', 'success');
                document.getElementById('convenioForm').reset();
                carregarConvenios();
            } catch (error) {
                mostrarMensagem('Endpoint ainda não implementado na API. Erro: ' + error.message, 'error');
            }
        });
        
        carregarConvenios();
    </script>
</body>
</html>
