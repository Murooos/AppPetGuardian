<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Guardian - MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }
        
        .animais-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .animal-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
        }
        
        .animal-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .animal-card p {
            color: #666;
            margin: 5px 0;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .api-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-left: 10px;
        }
        
        .api-status.online {
            background: #d4edda;
            color: #155724;
        }
        
        .api-status.offline {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐾 Pet Guardian</h1>
            <p>Gerencie seus animais de estimação</p>
            <span id="apiStatus" class="api-status offline">API Offline</span>
        </header>
        
        <div class="card">
            <h2>Adicionar Novo Animal</h2>
            <div id="message" class="message"></div>
            <form id="animalForm">
                <div class="form-group">
                    <label for="nome">Nome do Animal:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="especie">Espécie:</label>
                    <select id="especie" name="especie" required>
                        <option value="">Selecione...</option>
                        <option value="Cão">Cão</option>
                        <option value="Gato">Gato</option>
                        <option value="Pássaro">Pássaro</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" min="0" required>
                </div>
                <button type="submit">Adicionar Animal</button>
            </form>
        </div>
        
        <div class="card">
            <h2>Lista de Animais</h2>
            <button onclick="carregarAnimais()" class="btn-secondary">Atualizar Lista</button>
            <div id="animaisList" class="animais-list">
                <div class="loading">Carregando animais...</div>
            </div>
        </div>
    </div>
    
    <script>
        // URL da API - será substituída automaticamente no Netlify
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://pet-guardian-api.onrender.com';
        
        // Verificar status da API
        async function verificarAPI() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    document.getElementById('apiStatus').textContent = 'API Online';
                    document.getElementById('apiStatus').className = 'api-status online';
                } else {
                    throw new Error('API não respondeu');
                }
            } catch (error) {
                document.getElementById('apiStatus').textContent = 'API Offline';
                document.getElementById('apiStatus').className = 'api-status offline';
            }
        }
        
        // Mostrar mensagem
        function mostrarMensagem(texto, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = texto;
            messageDiv.className = `message ${tipo}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // Carregar lista de animais
        async function carregarAnimais() {
            const animaisList = document.getElementById('animaisList');
            animaisList.innerHTML = '<div class="loading">Carregando animais...</div>';
            
            try {
                const response = await fetch(`${API_URL}/animais/`);
                if (!response.ok) throw new Error('Erro ao carregar animais');
                
                const animais = await response.json();
                
                if (animais.length === 0) {
                    animaisList.innerHTML = '<p style="text-align: center; color: #666;">Nenhum animal cadastrado ainda.</p>';
                    return;
                }
                
                animaisList.innerHTML = animais.map(animal => `
                    <div class="animal-card">
                        <h3>${animal.nome || 'Sem nome'}</h3>
                        <p><strong>Espécie:</strong> ${animal.especie || 'N/A'}</p>
                        <p><strong>Idade:</strong> ${animal.idade || 'N/A'} anos</p>
                    </div>
                `).join('');
            } catch (error) {
                animaisList.innerHTML = `<p style="text-align: center; color: #721c24;">Erro ao carregar animais: ${error.message}</p>`;
            }
        }
        
        // Adicionar novo animal
        document.getElementById('animalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                id: Date.now(), // ID temporário
                nome: document.getElementById('nome').value,
                especie: document.getElementById('especie').value,
                idade: parseInt(document.getElementById('idade').value)
            };
            
            try {
                const response = await fetch(`${API_URL}/animais/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) throw new Error('Erro ao adicionar animal');
                
                mostrarMensagem('Animal adicionado com sucesso!', 'success');
                document.getElementById('animalForm').reset();
                carregarAnimais();
            } catch (error) {
                mostrarMensagem(`Erro ao adicionar animal: ${error.message}`, 'error');
            }
        });
        
        // Inicializar
        verificarAPI();
        carregarAnimais();
        
        // Verificar API a cada 30 segundos
        setInterval(verificarAPI, 30000);
    </script>
</body>
</html>
